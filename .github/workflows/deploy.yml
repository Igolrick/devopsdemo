name: Build, Deploy & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: public/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: public/

      - name: Get Tag Info
        run: echo "Running workflow for tag ${{ github.ref_name }}"

      - name: Deploy
        run: echo "Deploying application..."

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: public/

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == *"beta"* ]]; then
            VERSION="${TAG_NAME}"
          else
            VERSION="${TAG_NAME}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ steps.extract_version.outputs.version }}" == *"beta"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP archive
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          cd public
          zip -r /DevOps-Demo-${VERSION}.zip .
          cd ..
          ls -la /DevOps-Demo-${VERSION}.zip

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.extract_version.outputs.version }}
          name: ${{ steps.extract_version.outputs.version }}
          artifacts: "/DevOps-Demo-${{ steps.extract_version.outputs.version }}.zip"
          prerelease: ${{ steps.extract_version.outputs.is_prerelease == 'true' }}
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
